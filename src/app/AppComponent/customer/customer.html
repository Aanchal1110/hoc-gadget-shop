<div class="container mt-4">

  <div class="mb-3">
    <button class="btn btn-primary" (click)="openCustomerDialog()">
      Add a new Customer
    </button>
  </div>

  <h4 class="mb-3">Customer Details</h4>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Customer Id</th>
        <th>Customer Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Registration Date</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let customer of customerDetails">
        <td>{{ customer.CustomerId }}</td>
        <td>{{ customer.FirstName }} {{ customer.LastName }}</td>
        <td>{{ customer.Email }}</td>
        <td>{{ customer.Phone }}</td>
        <td>{{ customer.RegistrationDate }}</td>
        <td>
          <button class="btn btn-primary btn-sm me-2" (click)="openEditDialogBox(customer)">Edit</button>
          <button class="btn btn-danger btn-sm" (click)="openConfirmDialog(customer.CustomerId)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

</div>
