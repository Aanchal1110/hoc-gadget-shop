<div class="mx-3 my-2">
  <h1>Inventory</h1>
</div>

<div class="row mx-3">
  <form class="row gx-3 gy-2 align-items-center"
        (ngSubmit)="onSubmit()" #form="ngForm" novalidate>

    <!-- LABEL ROW -->
    <div class="row">
      <div class="col-sm-3">
        <label>Product Id</label>
      </div>
      <div class="col-sm-3">
        <label>Product Name</label>
      </div>
      <div class="col-sm-3">
        <label>Quantity Available</label>
      </div>
      <div class="col-sm-3">
        <label>Reorder Point</label>
      </div>
    </div>

    <!-- INPUT ROW -->
    <div class="row">

      <!-- Product Id -->
      <div class="col-sm-3">
        <label class="visually-hidden">Product Id</label>
        <input type="text"
               class="form-control"
               placeholder="1001"
               name="productId"
               [(ngModel)]="inventory.productID" name="productId">
      </div>

      <!-- Product Name -->
      <div class="col-sm-3">
        <label class="visually-hidden">Product</label>
        <select class="form-select"
                name="productName"
                [(ngModel)]="inventory.productName">
          <option value="">Choose...</option>
          <option value="Earphones">Earphones</option>
          <option value="Mobiles">Mobiles</option>
          <option value="Playstation">Playstation</option>
        </select>
      </div>

      <!-- Quantity -->
      <div class="col-sm-3">
        <label class="visually-hidden">Quantity</label>
        <input type="number"
               class="form-control"
               placeholder="0"
               name="quantity"
               [(ngModel)]="inventory.availableQty">
      </div>

      <!-- Reorder -->
      <div class="col-sm-3">
        <label class="visually-hidden">Reorder</label>
        <input type="number"
               class="form-control"
               placeholder="0"
               name="reorder"
               [(ngModel)]="inventory.reorderPoint">
      </div>

    </div>

    <!-- BUTTON -->
    <div class="mt-3">
      <button type="submit" class="btn btn-primary">Submit</button>
    </div>

  </form>
</div>
